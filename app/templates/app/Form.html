<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1 style="text-align: center;">Add a Useful Website</h1>
<br><br>
  <form method="post" >
    {% csrf_token %}
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Website Name</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" name="web-name">
  </div>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Select category</label>
<select name="category" class="form-control">
    <option value="Education">Education</option>
    <option value="Programming">Programming</option>
    <option value="AI Tools">AI Tools</option>
    <option value="Notes">Notes</option>
    <option value="Books">Books</option>
    <option value="Research">Research</option>
    <option value="Productivity">Productivity</option>
    <option value="Design">Design</option>
    <option value="Resume">Resume</option>
    <option value="Jobs & Internships">Jobs & Internships</option>
    <option value="Scholarships">Scholarships</option>
    <option value="Coding Practice">Coding Practice</option>
    <option value="Developer Tools">Developer Tools</option>
    <option value="Videos / Learning">Videos / Learning</option>
    <option value="File Conversion">File Conversion</option>
    <option value="Cloud Storage">Cloud Storage</option>
    <option value="Collaboration">Collaboration</option>
    <option value="Mind Mapping">Mind Mapping</option>
    <option value="Time Management">Time Management</option>
    <option value="Language Learning">Language Learning</option>
    <option value="Games">Games</option>
</select>
  </div>
  <div class="mb-3">
    <label class="form-label">Website Link</label>
    <input type="url" class="form-control" placeholder="place the right website" name="web-link">
  </div>

  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea class="form-control" name="description" rows="3" placeholder="Write short description"></textarea>
  </div>

  <button type="submit" class="btn btn-primary">Submit</button>
</form>
</body>
</html>
